<style>
/* ============================================================
   字体系统 v2 — 完整配置
   分类：①标题LOGO ②UI界面 ③对话/剧情 ④年代标识 ⑤赛博数据
   ============================================================ */

/* ---- 像素字体无抗锯齿设置 ---- */
.font-pixel{-webkit-font-smoothing:none;-moz-osx-font-smoothing:unset;font-smooth:never;image-rendering:pixelated}

/* ---- 标题LOGO字体 ---- */
.font-title{font-family:'Orbitron','851Electro','Press Start 2P',sans-serif}
.font-title-zh{font-family:'Orbitron','851Electro','DotGothic16','Microsoft YaHei',sans-serif}
/* ---- UI界面字体 ---- */
.font-ui{font-family:'DotGothic16','Microsoft YaHei','PingFang SC',sans-serif}
/* ---- 对话/剧情字体 ---- */
.font-story{font-family:'ZCOOL QingKe HuangYou','DotGothic16','Microsoft YaHei',cursive}
/* ---- 年代标识字体 ---- */
.font-era-retro{font-family:'PixelMplus12','Noto Serif SC','DotGothic16',serif}

.font-era-cyber{font-family:'Orbitron','Share Tech Mono','DotGothic16',monospace}
/* ---- 赛博数据 ---- */
.font-data{font-family:'Share Tech Mono','DotGothic16',monospace}

/* ---- 经典暗色主题 ---- */
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a1a;color:#e0e0e0;font-family:'DotGothic16','Microsoft YaHei','PingFang SC',sans-serif;min-height:100vh;display:flex;justify-content:center;align-items:center;font-size:16px;letter-spacing:0.03em;line-height:1.6;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
.font-pixel body{-webkit-font-smoothing:none}
#app{width:100%;max-width:820px;padding:24px}

/* 职业选择 */
#career-select{text-align:center;padding-top:20px}
#career-select .game-title{display:flex;flex-direction:column;align-items:center;gap:8px;margin-bottom:14px}
#career-select .title-chinese{font-family:'Orbitron','851Electro','DotGothic16',serif;font-size:3.2rem;color:#ffd200;line-height:1.2;letter-spacing:8px;text-shadow:0 0 20px rgba(255,210,0,0.25),0 0 60px rgba(255,210,0,0.1);font-weight:900}
#career-select .title-english{font-family:'Press Start 2P',monospace;font-size:0.9rem;color:#c0a040;letter-spacing:3px;word-break:keep-all;opacity:0.8}
#career-select .title-sub{font-family:'DotGothic16','Microsoft YaHei',sans-serif;color:#8892b0;margin-bottom:20px;font-size:0.88rem;line-height:1.6}

/* 学段选择 */
.grade-selector{display:flex;justify-content:center;gap:10px;max-width:400px;margin:0 auto 20px}
.grade-btn{padding:10px 28px;font-size:0.95rem;font-weight:700;border:1.5px solid rgba(255,210,0,0.25);
  border-radius:10px;cursor:pointer;color:#8892b0;background:rgba(17,17,40,0.6);
  transition:all 0.25s;user-select:none;font-family:'DotGothic16','Microsoft YaHei',sans-serif}
.grade-btn:hover{border-color:rgba(255,210,0,0.5);color:#c0c8d8}
.grade-btn.active{color:#1a1a2e;background:linear-gradient(135deg,#ffd200,#ff9a00);
  border-color:transparent;box-shadow:0 0 16px rgba(255,210,0,0.3)}

/* 职业卡片 */
.cards{display:flex;flex-wrap:wrap;justify-content:center;gap:16px}
.card{flex:0 0 calc((100% - 32px) / 3);min-width:200px;max-width:260px;
  border:2px solid rgba(255,210,0,0.18);border-radius:16px;
  padding:24px 16px 20px;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:10px;
  transition:all 0.25s;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;
  border-radius:16px;opacity:0.06;transition:opacity 0.25s;z-index:0}
.card:hover::before{opacity:0.12}
.card:hover{border-color:#ffd200;transform:translateY(-6px);box-shadow:0 8px 30px rgba(255,210,0,0.2)}
.card .card-icon{font-size:3rem;position:relative;z-index:1;
  width:72px;height:72px;display:flex;align-items:center;justify-content:center;
  border-radius:50%;margin-bottom:4px}
.card .info{text-align:center;position:relative;z-index:1}
.card .name{font-family:'DotGothic16','Microsoft YaHei',sans-serif;font-size:1.15rem;font-weight:700;color:#fff;margin-bottom:4px}
.card .desc{font-size:0.8rem;color:#8892b0;line-height:1.4}
/* 各职业配色 */
.card-farmer{background:linear-gradient(135deg,#1a2e1a,#0d2818)}
.card-farmer::before{background:radial-gradient(circle at 50% 0%,#4ade80,transparent 70%)}
.card-farmer .card-icon{background:rgba(74,222,128,0.15);box-shadow:0 0 20px rgba(74,222,128,0.15)}
.card-farmer:hover{border-color:#4ade80}
.card-journalist{background:linear-gradient(135deg,#1a1f2e,#0d1826)}
.card-journalist::before{background:radial-gradient(circle at 50% 0%,#60a5fa,transparent 70%)}
.card-journalist .card-icon{background:rgba(96,165,250,0.15);box-shadow:0 0 20px rgba(96,165,250,0.15)}
.card-journalist:hover{border-color:#60a5fa}
.card-doctor{background:linear-gradient(135deg,#2e1a1f,#260d14)}
.card-doctor::before{background:radial-gradient(circle at 50% 0%,#f472b6,transparent 70%)}
.card-doctor .card-icon{background:rgba(244,114,182,0.15);box-shadow:0 0 20px rgba(244,114,182,0.15)}
.card-doctor:hover{border-color:#f472b6}
.card-programmer{background:linear-gradient(135deg,#1a262e,#0d1a20)}
.card-programmer::before{background:radial-gradient(circle at 50% 0%,#22d3ee,transparent 70%)}
.card-programmer .card-icon{background:rgba(34,211,238,0.15);box-shadow:0 0 20px rgba(34,211,238,0.15)}
.card-programmer:hover{border-color:#22d3ee}
.card-engineer{background:linear-gradient(135deg,#2e241a,#20160d)}
.card-engineer::before{background:radial-gradient(circle at 50% 0%,#fb923c,transparent 70%)}
.card-engineer .card-icon{background:rgba(251,146,60,0.15);box-shadow:0 0 20px rgba(251,146,60,0.15)}
.card-engineer:hover{border-color:#fb923c}

/* 游戏区域 */
#game-area{display:none}
#top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;font-size:0.85rem;color:#8892b0}
#top-bar-left{display:flex;align-items:center;gap:10px}
#btn-back{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.2);color:#8892b0;padding:4px 12px;border-radius:6px;cursor:pointer;font-size:0.8rem;font-family:'DotGothic16','Microsoft YaHei',sans-serif;transition:all 0.2s}
#btn-back:hover{background:rgba(255,255,255,0.15);color:#fff;border-color:rgba(255,255,255,0.4)}
#subject-label{font-family:'DotGothic16','Microsoft YaHei',sans-serif;color:#ffd200;font-weight:700;font-size:0.85rem}
#top-bar-right{display:flex;align-items:center;gap:10px}
#btn-records{background:rgba(255,210,0,0.1);border:1px solid rgba(255,210,0,0.3);color:#ffd200;padding:4px 10px;border-radius:6px;cursor:pointer;font-size:0.8rem;font-family:'DotGothic16','Microsoft YaHei',sans-serif;transition:all 0.2s}
#btn-records:hover{background:rgba(255,210,0,0.2)}
#stats-display{font-family:'DotGothic16','Microsoft YaHei',sans-serif;color:#b0b8c8;font-size:0.85rem}

/* ===== 时代时间轴 ===== */
.era-timeline{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;padding:10px 12px;background:rgba(17,17,40,0.6);border-radius:10px;border:1px solid rgba(255,210,0,0.1)}
.era-node{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1;position:relative;transition:all 0.3s}
.era-node .era-dot{width:10px;height:10px;border-radius:50%;border:2px solid rgba(255,210,0,0.2);background:#1a1a2e;transition:all 0.3s}
.era-node .era-year{font-size:0.7rem;color:#666;transition:color 0.3s;font-weight:600}
.era-node .era-name{font-size:0.78rem;font-weight:600;color:#666;transition:color 0.3s}
.era-node.era-retro .era-year{font-family:'PixelMplus12','Noto Serif SC','DotGothic16',monospace;letter-spacing:1px}
.era-node.era-retro .era-name{font-family:'PixelMplus12','Noto Serif SC','DotGothic16',monospace;letter-spacing:1px}
.era-node.era-modern .era-year{font-family:'DotGothic16','Microsoft YaHei',sans-serif}
.era-node.era-modern .era-name{font-family:'DotGothic16','Microsoft YaHei',sans-serif}
.era-node.era-cyber .era-year{font-family:'Orbitron','Share Tech Mono','DotGothic16',monospace;letter-spacing:1px;text-transform:uppercase}
.era-node.era-cyber .era-name{font-family:'Orbitron','Share Tech Mono','DotGothic16',monospace;letter-spacing:1px}
.era-node.active .era-dot{background:#ffd200;border-color:#ffd200;box-shadow:0 0 10px rgba(255,210,0,0.6);transform:scale(1.3)}
.era-node.active .era-year{color:#ffd200}
.era-node.active .era-name{color:#fff}
.era-node.completed .era-dot{background:#4ade80;border-color:#4ade80}
.era-node.completed .era-year{color:#4ade80}
.era-node.completed .era-name{color:#4ade80}
.era-node.locked .era-dot{border-color:rgba(255,255,255,0.1)}
.era-node.locked .era-name{color:#444}
.era-node.locked .era-year{color:#333}
.era-connector{flex:0 0 24px;height:2px;background:rgba(255,255,255,0.08);transition:background 0.4s}
.era-connector.completed{background:rgba(74,222,128,0.4)}

/* 进度条 & 题目 */
#xp-bar-wrap{width:100%;height:4px;background:#2a2a4a;border-radius:2px;margin-bottom:16px;overflow:hidden}
#xp-bar{height:100%;background:linear-gradient(90deg,#ffd200,#ff6a00);border-radius:2px;transition:width 0.4s;width:0%}
#question-box{background:#111128;border:1px solid rgba(255,210,0,0.15);border-radius:12px;padding:18px;margin-bottom:14px}
#question-text{font-family:'ZCOOL QingKe HuangYou','DotGothic16','Microsoft YaHei',cursive;font-size:1rem;line-height:1.8;margin-bottom:14px;letter-spacing:0.02em}
/* 时代切换 → 题目字体 */
#game-area.era-retro #question-text{font-family:'Noto Serif SC','ZCOOL QingKe HuangYou','DotGothic16',serif;font-size:0.95rem}
#game-area.era-modern #question-text{font-family:'DotGothic16','Microsoft YaHei',sans-serif;font-size:0.95rem}
#game-area.era-cyber #question-text{font-family:'Share Tech Mono','DotGothic16',monospace;font-size:0.92rem;letter-spacing:0.04em}
/* 时代切换 → 场景字体 */
#game-area.era-retro .era-scenario{font-family:'Noto Serif SC','ZCOOL QingKe HuangYou',serif}
#game-area.era-modern .era-scenario{font-family:'DotGothic16','Microsoft YaHei',sans-serif}
#game-area.era-cyber .era-scenario{font-family:'Share Tech Mono','DotGothic16',monospace;letter-spacing:0.03em}
#game-area.era-cyber .era-scenario strong{color:#22d3ee}
/* 时代切换 → 标签字体 */
#game-area.era-retro #subject-label{font-family:'PixelMplus12','Noto Serif SC','DotGothic16',monospace}
#game-area.era-cyber #subject-label{font-family:'Orbitron','Share Tech Mono',monospace;letter-spacing:2px}
#options-grid{display:flex;flex-direction:column;gap:8px}
.option-btn{background:#1a1a2e;border:1.5px solid rgba(255,210,0,0.2);border-radius:8px;padding:11px 14px;color:#c0c8d8;font-size:0.88rem;font-family:'DotGothic16','Microsoft YaHei',sans-serif;cursor:pointer;text-align:left;transition:all 0.2s}
.option-btn:hover:not(:disabled){border-color:#ffd200;background:rgba(255,210,0,0.08)}
.option-btn:disabled{cursor:not-allowed;opacity:0.7}
.option-btn.correct{background:rgba(0,200,100,0.2)!important;border-color:#00c864!important;color:#00ff80!important}
.option-btn.partial{background:rgba(255,210,0,0.2)!important;border-color:#f1c40f!important;color:#ffd200!important}
.option-btn.wrong{background:rgba(255,60,60,0.2)!important;border-color:#ff3c3c!important;color:#ff6b6b!important}

#btn-next{width:100%;background:linear-gradient(135deg,#ffd200,#ff9a00);border:none;border-radius:10px;padding:12px;font-size:1rem;font-weight:700;color:#1a1a2e;font-family:'DotGothic16','Microsoft YaHei',sans-serif;cursor:pointer;transition:all 0.2s}
#btn-next:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 4px 15px rgba(255,210,0,0.3)}

/* 结果 */
#result-area{display:none;text-align:center;padding:30px 0}
#result-career{font-size:1.4rem;color:#fff;margin-bottom:6px;font-family:'DotGothic16','Microsoft YaHei',sans-serif}
#result-career .result-icon{font-size:2rem;display:block}
#result-stats{font-family:'ZCOOL QingKe HuangYou','DotGothic16','Microsoft YaHei',cursive;color:#b0b8c8;font-size:0.95rem;line-height:1.8}
#btn-restart{margin-top:20px;width:100%;background:linear-gradient(135deg,#ff6a00,#ffd200);border:none;border-radius:10px;padding:12px;font-size:1rem;font-weight:700;color:#1a1a2e;font-family:'DotGothic16','Microsoft YaHei',sans-serif;cursor:pointer}
#btn-records-result{margin-top:12px;width:100%;background:rgba(255,210,0,0.1);border:1px solid rgba(255,210,0,0.3);border-radius:10px;padding:12px;font-size:1rem;font-weight:700;color:#ffd200;font-family:'DotGothic16','Microsoft YaHei',sans-serif;cursor:pointer}

/* 错题本 */
.rf-btn{padding:5px 12px;border:none;border-radius:4px;color:#fff;cursor:pointer;font-size:12px;font-family:'DotGothic16','Microsoft YaHei',sans-serif}
@keyframes kcFadeIn{from{opacity:0;transform:scale(0.9)}to{opacity:1;transform:scale(1)}}

/* 升级动画 */
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn 0.4s ease}
@keyframes lvScaleIn{0%{opacity:0;transform:scale(0.5)}60%{transform:scale(1.08)}100%{opacity:1;transform:scale(1)}}
@keyframes lvConfetti{0%{transform:translateY(-10px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
@keyframes lvStar{0%{opacity:0;transform:scale(0) rotate(-180deg)}100%{opacity:1;transform:scale(1) rotate(0deg)}}
@keyframes lvPulse{0%,100%{box-shadow:0 0 20px rgba(255,210,0,0.3)}50%{box-shadow:0 0 40px rgba(255,210,0,0.6)}}
#lv-overlay{position:fixed;top:0;left:0;width:100%;height:100%;z-index:300;
  background:rgba(0,0,0,0.7);display:flex;justify-content:center;align-items:center;
  animation:lvScaleIn 0.4s ease}
#lv-card{background:linear-gradient(135deg,#1a1a3e,#0d0d2e);border:2px solid #ffd200;
  border-radius:20px;padding:32px 40px;text-align:center;max-width:380px;width:90%;
  animation:lvPulse 2s infinite;position:relative;overflow:hidden}
#lv-card::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;
  background:conic-gradient(from 0deg,transparent,rgba(255,210,0,0.08),transparent,rgba(255,210,0,0.08),transparent);
  animation:lvStar 3s linear infinite}
#lv-card-inner{position:relative;z-index:1}
#lv-star{font-size:3rem;display:block;animation:lvStar 0.6s ease}
#lv-title{font-size:1.3rem;color:#ffd200;font-weight:700;margin:8px 0}
#lv-level{font-size:3.5rem;font-weight:900;color:#fff;line-height:1;margin:8px 0;
  text-shadow:0 0 20px rgba(255,210,0,0.4);font-family:'Press Start 2P',monospace}
#lv-desc{font-size:0.85rem;color:#b0b8c8;margin:6px 0 16px}
#lv-btn{background:linear-gradient(135deg,#ffd200,#ff9a00);border:none;border-radius:10px;
  padding:10px 36px;font-size:1rem;font-weight:700;color:#1a1a2e;cursor:pointer;
  font-family:'DotGothic16','Microsoft YaHei',sans-serif;transition:all 0.2s}
#lv-btn:hover{transform:translateY(-2px);box-shadow:0 4px 15px rgba(255,210,0,0.3)}
.lv-particle{position:fixed;width:8px;height:8px;border-radius:50%;z-index:301;
  animation:lvConfetti 2.5s linear forwards;pointer-events:none}
</style>
</head>
<body>
<div id="app">

<!-- 职业选择 -->
<div id="career-select">
  <div class="game-title">
    <div class="title-chinese">明日基石</div>
    <div class="title-english">Foundation of Tomorrow</div>
  </div>
  <div class="title-sub">每一种职业、每一个选择，都是构筑未来的基石</div>
  <!-- 学段选择 -->
  <div class="grade-selector" id="grade-selector">
    <button class="grade-btn" data-grade="1" onclick="selectGrade(this,1)">高一</button>
    <button class="grade-btn" data-grade="2" onclick="selectGrade(this,2)">高二</button>
    <button class="grade-btn" data-grade="3" onclick="selectGrade(this,3)">高三</button>
  </div>
  <div class="cards" id="career-cards"></div>
</div>

<!-- 游戏区 -->
<div id="game-area">
  <div id="top-bar">
    <div id="top-bar-left">
      <button id="btn-back" onclick="goBackToCareer()">← 返回</button>
      <span id="subject-label">--</span>
    </div>
    <div id="top-bar-right">
      <button id="btn-records" onclick="showRecordsWindow()">📖 记录</button>
      <span id="stats-display">Lv.1 | ⭐0</span>
    </div>
  </div>
  <div class="era-timeline" id="era-timeline"></div>
  <div id="xp-bar-wrap"><div id="xp-bar"></div></div>

    <div id="question-text"></div>
    <div id="options-grid"></div>
    <div id="question-feedback"></div>
  </div>

</div>

     框架依赖
     ============================================================ -->
<script>
// --- 时代字体切换 ---
var ERA_FONT_CLASSES = ['era-retro','era-modern','era-cyber'];
function applyEraFont(eraIdx) {
  var ga = document.getElementById('game-area');
  if (!ga) return;
  ga.classList.remove('era-retro','era-modern','era-cyber');
  if (eraIdx >= 0 && eraIdx < ERA_FONT_CLASSES.length) {
    ga.classList.add(ERA_FONT_CLASSES[eraIdx]);
  }
}

// --- 学段选择 ---
var selectedGrade = 0;

function selectGrade(btn, grade) {
  if (selectedGrade === grade) return;
  var btns = document.querySelectorAll('.grade-btn');
  btns.forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  selectedGrade = grade;
}

// --- 职业配置 ---
var CAREER_CONFIG = {
  farmer:     { name:'🌾 农民',    icon:'🌾', desc:'化学 + 政治', cls:'card-farmer' },
  journalist: { name:'📰 记者',    icon:'📰', desc:'语文 + 英语', cls:'card-journalist' },
  doctor:     { name:'💉 医生',    icon:'💉', desc:'生物 + 地理', cls:'card-doctor' },
  programmer: { name:'💻 程序员', desc:'信息科技 + 历史', icon:'💻', cls:'card-programmer' },
  engineer:   { name:'🔧 工程师', desc:'数学 + 物理', icon:'🔧', cls:'card-engineer' }
};

// --- 游戏状态 ---
var GameState = { score: 0 };
function getLevel(score) { return Math.floor(score / 50) + 1; }
function getLevelProgress(score) { return (score % 50) / 50; }

function addScore(amt) {
  var oldLevel = getLevel(GameState.score);
  GameState.score += amt;
  var newLevel = getLevel(GameState.score);
  if (newLevel > oldLevel && typeof onLevelUp === 'function') onLevelUp(newLevel);
  updateStatsDisplay();
  updateExpBar();
}

function updateExpBar() {
  var pct = getLevelProgress(GameState.score) * 100;
  document.getElementById('xp-bar').style.width = Math.min(100, pct) + '%';
}

function updateStatsDisplay() {
  document.getElementById('stats-display').textContent = 'Lv.' + getLevel(GameState.score) + ' | ⭐' + GameState.score;
}

function setSubjectLabel(t) { document.getElementById('subject-label').textContent = t; }
function setQuestionNumber(n) {}
function setQuestionText(t) { document.getElementById('question-text').innerHTML = t; }
function showFeedback(html, isGood) {
  var el = document.getElementById('question-feedback');
  el.innerHTML = '<div class="fade-in" style="color:' + (isGood ? '#00ff80' : '#ff6b6b') + '">' + html + '</div>';
}
function showResult(name, level, score) {
  document.getElementById('game-area').style.display = 'none';
  document.getElementById('result-area').style.display = 'block';
}
</script>

<script>
var STORAGE_KEY = 'lifeSimulator_records';

function saveRecord(record) {
  var all = loadAllRecords();
  record.timestamp = Date.now();
  all.push(record);
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(all)); }
  catch(e) { if (e.name === 'QuotaExceededError') { all = all.slice(-200); localStorage.setItem(STORAGE_KEY, JSON.stringify(all)); } }
}
function loadAllRecords() { try { var data = localStorage.getItem(STORAGE_KEY); return data ? JSON.parse(data) : []; } catch(e) { return []; } }
function getRecordsByProfession(professionId) { return loadAllRecords().filter(function(r) { return r.professionId === professionId; }); }
function getWrongRecords() { return loadAllRecords().filter(function(r) { return !r.correct; }); }
function getStats() {
  var all = loadAllRecords();
  var total = all.length;
  var correct = all.filter(function(r) { return r.correct; }).length;
  var wrong = all.filter(function(r) { return !r.correct && !r.partial; }).length;
  var partial = all.filter(function(r) { return r.partial; }).length;
  var totalPoints = all.reduce(function(s, r) { return s + (r.pointEarned || 0); }, 0);
  return { total: total, correct: correct, wrong: wrong, partial: partial, totalPoints: totalPoints };
}
function clearRecords() { localStorage.removeItem(STORAGE_KEY); }

function showRecordsWindow() {
  var overlay = document.getElementById('records-overlay');
  if (overlay) { overlay.style.display = 'flex'; return; }
  var html = '<div id="records-overlay" style="position:fixed;top:0;left:0;width:100%;height:100%;z-index:100;background:rgba(0,0,0,0.88);display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:20px;overflow-y:auto;">';
  html += '<div style="width:100%;max-width:600px;display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;"><h2 style="color:#FFD700;font-size:18px;">📖 知识宝典 · 错题本</h2><button onclick="closeRecordsWindow()" style="font-size:18px;background:none;border:none;color:#fff;cursor:pointer;padding:4px 10px;">✕</button></div>';
  var stats = getStats();
  html += '<div style="width:100%;max-width:600px;display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;color:#fff;font-size:13px;">';
  html += '<span style="background:rgba(255,255,255,0.1);padding:6px 12px;border-radius:6px;">📝 共 ' + stats.total + ' 题</span>';
  html += '<span style="background:rgba(46,204,113,0.2);padding:6px 12px;border-radius:6px;color:#2ecc71;">✅ ' + stats.correct + '</span>';
  html += '<span style="background:rgba(241,196,15,0.2);padding:6px 12px;border-radius:6px;color:#f1c40f;">⚠ ' + stats.partial + '</span>';
  html += '<span style="background:rgba(231,76,60,0.2);padding:6px 12px;border-radius:6px;color:#e74c3c;">❌ ' + stats.wrong + '</span>';
  html += '<span style="background:rgba(255,215,0,0.2);padding:6px 12px;border-radius:6px;color:#FFD700;">⭐ ' + stats.totalPoints + '</span></div>';
  html += '<div style="width:100%;max-width:600px;display:flex;gap:6px;margin-bottom:10px;">';
  html += '<button onclick="filterRecords(\'all\')" id="filter-all" class="rf-btn" style="background:#3498db;">全部</button>';
  html += '<button onclick="filterRecords(\'correct\')" id="filter-correct" class="rf-btn" style="background:#2ecc71;">正确</button>';
  html += '<button onclick="filterRecords(\'wrong\')" id="filter-wrong" class="rf-btn" style="background:#e74c3c;">错误/部分</button>';
  html += '<button onclick="clearRecords();closeRecordsWindow()" style="margin-left:auto;padding:5px 12px;font-size:12px;background:rgba(255,255,255,0.1);border:1px solid #555;border-radius:4px;color:#aaa;cursor:pointer;">清空</button></div>';
  html += '<div id="records-list" style="width:100%;max-width:600px;"></div></div>';
  document.body.insertAdjacentHTML('beforeend', html);
  filterRecords('wrong');
}
function closeRecordsWindow() { var overlay = document.getElementById('records-overlay'); if (overlay) overlay.style.display = 'none'; }

function showKnowledgeCard(record) {
  var existing = document.getElementById('knowledge-card-popup'); if (existing) existing.remove();
  var correctLetters = record.correctAns.map(function(i) { return String.fromCharCode(65 + i); }).join(', ');
  var userLetters = record.userAns.map(function(i) { return String.fromCharCode(65 + i); }).join(', ');
  var isCorrect = record.correct;
  var borderColor = isCorrect ? '#2ecc71' : (record.partial ? '#f1c40f' : '#e74c3c');
  var statusText = isCorrect ? '✅ 回答正确' : (record.partial ? '⚠ 部分正确' : '❌ 回答错误');
  var html = '<div id="knowledge-card-popup" style="position:fixed;top:0;left:0;width:100%;height:100%;z-index:200;background:rgba(0,0,0,0.7);display:flex;justify-content:center;align-items:center;animation:kcFadeIn 0.2s ease;">';
  html += '<div style="width:90%;max-width:520px;background:#1a1a2e;border:2px solid ' + borderColor + ';border-radius:12px;padding:20px;box-shadow:0 8px 32px rgba(0,0,0,0.5);position:relative;">';
  html += '<button onclick="this.parentElement.parentElement.remove()" style="position:absolute;top:8px;right:12px;font-size:16px;background:none;border:none;color:#888;cursor:pointer;">✕</button>';
  html += '<div style="font-size:14px;color:' + borderColor + ';margin-bottom:10px;font-weight:700;">📖 知识卡片</div>';
  html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;"><span style="font-size:12px;color:' + borderColor + ';">' + statusText + ' +' + record.pointEarned + '分</span><span style="font-size:11px;color:#888;">' + (record.subject || '综合') + '</span></div>';
  html += '<div style="background:rgba(255,255,255,0.05);border-radius:8px;padding:10px 12px;margin-bottom:10px;"><div style="font-size:13px;color:#ddd;line-height:1.7;">' + record.text + '</div></div>';
  html += '<div style="display:flex;gap:10px;margin-bottom:10px;font-size:12px;"><div style="flex:1;background:rgba(231,76,60,0.1);border-radius:6px;padding:6px 10px;"><div style="color:#e74c3c;margin-bottom:2px;">你的答案</div><div style="color:#ddd;">' + userLetters + '</div></div><div style="flex:1;background:rgba(46,204,113,0.1);border-radius:6px;padding:6px 10px;"><div style="color:#2ecc71;margin-bottom:2px;">正确答案</div><div style="color:#ddd;">' + correctLetters + '</div></div></div>';
  if (record.choices && record.choices.length > 0) {
    html += '<div style="margin-bottom:10px;"><div style="font-size:12px;color:#aaa;margin-bottom:4px;">全部选项：</div>';
    record.choices.forEach(function(c, i) {
      var letter = String.fromCharCode(65 + i);
      var isUser = record.userAns.indexOf(i) !== -1;
      var isCorr = c.correct;
      var bg = isCorr ? 'rgba(46,204,113,0.12)' : (isUser && !isCorr ? 'rgba(231,76,60,0.12)' : 'transparent');
      var border = isCorr ? '1px solid rgba(46,204,113,0.3)' : (isUser ? '1px solid rgba(231,76,60,0.3)' : '1px solid transparent');
      var label = ''; if (isCorr && isUser) label = ' ✅'; else if (isCorr) label = ' ✓'; else if (isUser) label = ' ✗';
      html += '<div style="display:flex;align-items:flex-start;gap:4px;padding:3px 6px;margin:2px 0;border-radius:4px;background:' + bg + ';border:' + border + ';"><span style="color:' + (isCorr ? '#2ecc71' : (isUser ? '#e74c3c' : '#888')) + ';font-size:12px;white-space:nowrap;">' + letter + '.</span><span style="font-size:12px;color:#ccc;">' + c.text + '</span><span style="font-size:11px;color:' + (isCorr ? '#2ecc71' : '#e74c3c') + ';white-space:nowrap;">' + label + '</span></div>';
    });
    html += '</div>';
  }
  if (record.knowledgeArr && record.knowledgeArr.length > 0) {
    html += '<div style="background:rgba(255,215,0,0.06);border-left:3px solid #FFD700;border-radius:0 6px 6px 0;padding:8px 12px;"><div style="font-size:12px;color:#FFD700;margin-bottom:4px;">📚 知识点解析</div>';
    record.knowledgeArr.forEach(function(k) { html += '<div style="font-size:12px;color:#ddd;line-height:1.6;margin-bottom:4px;">' + k + '</div>'; });
    html += '</div>';
  }
  html += '</div></div>';
  document.body.insertAdjacentHTML('beforeend', html);
}

function retryWrongRecord(timestamp) {
  var all = loadAllRecords(); var record = null;
  for (var i = 0; i < all.length; i++) { if (all[i].timestamp === timestamp) { record = all[i]; break; } }
  if (!record || !record.choices || record.choices.length === 0) return;
  closeRecordsWindow();
  var q = { text: record.text, subject: record.subject || '', choices: record.choices.map(function(c) { return { text: c.text, correct: c.correct, knowledge: c.knowledge || '' }; }) };
  currentQ = q; answered = false; selected = [];
  document.getElementById('result-area').style.display = 'none';
  document.getElementById('game-area').style.display = 'block';
  setSubjectLabel('🔁 错题重做 · ' + (record.subject || ''));
  setQuestionText(q.text);
  document.getElementById('question-feedback').innerHTML = '';
  document.getElementById('btn-next').disabled = true;
  document.getElementById('options-grid').innerHTML = '';
  renderChoices(q);
}

function filterRecords(type) {
  var all = loadAllRecords();
  var filtered = type === 'correct' ? all.filter(function(r) { return r.correct; }) : type === 'wrong' ? all.filter(function(r) { return !r.correct; }) : all;
  var list = document.getElementById('records-list'); if (!list) return;
  if (filtered.length === 0) { list.innerHTML = '<div style="color:#aaa;text-align:center;padding:30px;font-size:14px;">暂无记录</div>'; return; }
  var html = '';
  filtered.slice().reverse().forEach(function(r) {
    var icon = r.correct ? '✅' : (r.partial ? '⚠' : '❌');
    var color = r.correct ? '#2ecc71' : (r.partial ? '#f1c40f' : '#e74c3c');
    var correctLetters = (r.correctAns || []).map(function(i) { return String.fromCharCode(65 + i); }).join(', ');
    var userLetters = (r.userAns || []).map(function(i) { return String.fromCharCode(65 + i); }).join(', ');
    var escapedText = (r.text || '').slice(0, 60).replace(/'/g, "\\'");
    html += '<div style="background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:10px 14px;margin-bottom:8px;color:#fff;">';
    html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;"><span style="color:' + color + ';font-size:12px;">' + icon + ' [' + (r.subject || '') + '] +' + (r.pointEarned || 0) + '分</span><span style="color:#666;font-size:11px;">' + new Date(r.timestamp).toLocaleString('zh-CN') + '</span></div>';
    html += '<div style="font-size:12px;color:#ddd;margin-bottom:4px;line-height:1.5;">' + (r.text || '').slice(0, 60) + ((r.text || '').length > 60 ? '…' : '') + '</div>';
    html += '<div style="font-size:11px;color:#aaa;">你选：' + userLetters + ' | 正确：' + correctLetters + '</div>';
    html += '<div style="display:flex;gap:4px;margin-top:5px;">';
    html += '<button onclick="showKnowledgeCard(loadRecordByTs(' + r.timestamp + '))" style="padding:3px 10px;font-size:12px;background:rgba(255,215,0,0.15);border:1px solid rgba(255,215,0,0.3);border-radius:4px;color:#FFD700;cursor:pointer;">📖 知识卡片</button>';
    if (!r.correct && r.choices && r.choices.length > 0) html += '<button onclick="retryWrongRecord(' + r.timestamp + ')" style="padding:3px 10px;font-size:12px;background:rgba(52,152,219,0.15);border:1px solid rgba(52,152,219,0.3);border-radius:4px;color:#3498db;cursor:pointer;">🔁 重做</button>';
    html += '</div></div>';
  });
  list.innerHTML = html;
}
function loadRecordByTs(ts) { var all = loadAllRecords(); for (var i = 0; i < all.length; i++) { if (all[i].timestamp === ts) return all[i]; } return null; }
</script>

<script>
(function() {
  var _origCheck = checkAnswer;
  checkAnswer = function(q, singleBtn) {
    var userSel = selected.slice();
    _origCheck(q, singleBtn);
    var correctIdx = [];
    q.choices.forEach(function(c, i) { if (c.correct) correctIdx.push(i); });
    var allCorrect = userSel.length === correctIdx.length && correctIdx.every(function(ci) { return userSel.indexOf(ci) !== -1; });
    var hasWrong = userSel.some(function(si) { return correctIdx.indexOf(si) === -1; });
    var gotSome = userSel.some(function(si) { return correctIdx.indexOf(si) !== -1; });
    var partial = gotSome && !allCorrect && !hasWrong;
    var point = allCorrect ? 10 : (partial ? 5 : 0);
    var knowledgeArr = [];
    q.choices.forEach(function(c) { if (c.correct && c.knowledge) knowledgeArr.push(c.knowledge); });
    saveRecord({ professionId: CareerKey, eraId: ERA_KEYS[curRound], round: curRound + 1, subject: q.subject || '', text: q.text, correct: allCorrect, partial: partial, pointEarned: point, userAns: userSel, correctAns: correctIdx.slice(), choices: q.choices.map(function(c) { return { text: c.text, correct: c.correct, knowledge: c.knowledge || '' }; }), knowledgeArr: knowledgeArr });
  };
})();

(function() {
  var _origSubmit = submitFill;
  submitFill = function(q, userAnswer) {
    var wasAnswered = answered;
    _origSubmit(q, userAnswer);
    if (!wasAnswered && answered && userAnswer) {
      var acceptable = q.answers || [q.answer];
      var isCorrect = false;
      for (var i = 0; i < acceptable.length; i++) { if (userAnswer.toLowerCase().replace(/\s/g, '') === acceptable[i].toLowerCase().replace(/\s/g, '')) { isCorrect = true; break; } }
      saveRecord({ professionId: CareerKey, eraId: ERA_KEYS[curRound], round: curRound + 1, subject: q.subject || '', text: q.text, correct: isCorrect, partial: false, pointEarned: isCorrect ? 5 : 0, userAns: [userAnswer], correctAns: [q.answer], choices: [], knowledgeArr: q.knowledge ? [q.knowledge] : [] });
    }
  };
})();

(function() {
  var html = '';
  for (var k in CAREER_CONFIG) {
    var c = CAREER_CONFIG[k];
    html += '<div class="card ' + c.cls + '" data-key="' + k + '"><div class="card-icon">' + c.icon + '</div><div class="info"><div class="name">' + c.name + '</div><div class="desc">' + c.desc + '</div></div></div>';
  }
  document.getElementById('career-cards').innerHTML = html;

  var cards = document.querySelectorAll('.card');
  cards.forEach(function(card) {
    card.addEventListener('click', function() {
      try {
        var key = card.getAttribute('data-key');
        document.getElementById('career-select').style.display = 'none';
        document.getElementById('game-area').style.display = 'block';
        document.getElementById('result-area').style.display = 'none';
        GameState = { score:0 };
        updateExpBar();
        updateStatsDisplay();
        if (typeof onCareerSelected === 'function') onCareerSelected(key);
      } catch(e) { console.error('[ERROR]', e.message); alert('游戏启动失败：' + e.message); }
    });
  });

  document.getElementById('btn-next').addEventListener('click', function() { if (typeof onNextQuestion === 'function') onNextQuestion(); });
  document.getElementById('btn-restart').addEventListener('click', function() {
    document.getElementById('result-area').style.display = 'none';
    document.getElementById('game-area').style.display = 'none';
    document.getElementById('career-select').style.display = 'block';
  });
})();

function goBackToCareer() {
  document.getElementById('game-area').style.display = 'none';
  document.getElementById('result-area').style.display = 'none';
  document.getElementById('career-select').style.display = 'block';
}
</script>
